name: Add Custom Domain

on:
  workflow_dispatch:
  push:
    branches: [never-auto-run-this]

jobs:
  add-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Find project and add domain
        run: |
          TOKEN="${{ secrets.VERCEL_TOKEN }}"
          
          echo "=== Listing Vercel projects ==="
          PROJECTS=$(curl -s "https://api.vercel.com/v9/projects" \
            -H "Authorization: Bearer $TOKEN")
          echo "$PROJECTS" | python3 -c "
import sys, json
d = json.load(sys.stdin)
for p in d.get('projects', []):
    print(f\"Project: {p['name']} | ID: {p['id']}\")
"
          
          PROJECT_ID=$(echo "$PROJECTS" | python3 -c "
import sys, json
d = json.load(sys.stdin)
for p in d.get('projects', []):
    if 'vessel' in p['name'].lower():
        print(p['id'])
        break
")
          echo "Project ID: $PROJECT_ID"
          
          echo "=== Adding custom domain ==="
          RESP=$(curl -s -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/domains" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name": "vesselvibe.getyetti.ai"}')
          echo "$RESP"
          
          echo "=== DNS Requirements ==="
          echo "$RESP" | python3 -c "
import sys, json
d = json.load(sys.stdin)
print('Domain:', d.get('name'))
print('Verified:', d.get('verified'))
for v in d.get('verification', []):
    print(f\"DNS: {v.get('type')} | Name: {v.get('domain')} | Value: {v.get('value')}\")
" || true
