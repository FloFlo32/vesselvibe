name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        id: deploy
        run: |
          OUTPUT=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --name=vesselvibe 2>&1)
          echo "$OUTPUT"
          DEPLOY_URL=$(echo "$OUTPUT" | grep -o 'https://[^ ]*\.vercel\.app' | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Write URL to repo
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deploy_url }}"
          echo "$DEPLOY_URL" > DEPLOYMENT_URL.txt
          git config user.email "ci@vesselvibe.com"
          git config user.name "VesselVibe CI"
          git add DEPLOYMENT_URL.txt
          git commit -m "chore: record deployment URL [skip ci]" || true
          git push || true
          echo "=== LIVE URL: $DEPLOY_URL ==="
